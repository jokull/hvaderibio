on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Run every hour
name: Deploy
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@main
      - uses: oven-sh/setup-bun@main

      - name: 📚 Install node dependencies
        run: bun install

      - name: 🔐 Trust TLS certificate chain for kvikmyndir.is
        run: |
          openssl s_client \
            -connect www.kvikmyndir.is:443 \
            -servername www.kvikmyndir.is \
            -showcerts </dev/null 2>/dev/null \
            | awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/' \
            > "$RUNNER_TEMP/kvikmyndir-chain.pem"

          echo "NODE_EXTRA_CA_CERTS=$RUNNER_TEMP/kvikmyndir-chain.pem" >> "$GITHUB_ENV"

      - name: 🎬 Scrape movie data
        run: bun scrape

      - name: ☑️ Check svelte-kit, format and linting
        run: bun check

      - name: 🔨 Build for Cloudflare
        run: bun run build
        env:
          ADAPTER: cloudflare
          NODE_ENV: production

      - name: 🚀 Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy .svelte-kit/cloudflare --project-name=hvaderibio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
